<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享的故事 - 乐高故事书</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/share.css">
</head>
<body>
    <div class="share-container">
        <header class="share-header">
            <div class="logo">
                <h1>乐高故事书</h1>
            </div>
        </header>

        <main class="share-main">
            <div class="password-prompt" id="passwordPrompt" style="display: none;">
                <div class="prompt-card">
                    <h2>此故事需要密码访问</h2>
                    <form id="passwordForm">
                        <div class="form-group">
                            <input type="password" id="sharePassword" placeholder="请输入访问密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">访问</button>
                    </form>
                </div>
            </div>

            <div class="share-content" id="shareContent" style="display: none;">
                <div class="book-info-card">
                    <div class="book-cover">
                        <img id="bookCover" src="" alt="">
                    </div>
                    <div class="book-details">
                        <h2 id="bookTitle">故事标题</h2>
                        <p class="book-theme" id="bookTheme">主题</p>
                        <p class="book-age" id="bookAge">适合年龄：-</p>
                    </div>
                </div>

                <div class="chapters-preview">
                    <h3>故事章节</h3>
                    <div class="chapters-list" id="chaptersList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>

                <div class="chapter-reader" id="chapterReader" style="display: none;">
                    <div class="reader-header">
                        <button class="back-btn" id="backToList">← 返回目录</button>
                        <h3 id="chapterTitle">章节标题</h3>
                    </div>
                    <div class="reader-content" id="chapterContent">
                        <p>章节内容加载中...</p>
                    </div>
                    <div class="reader-image" id="readerImage">
                        <img src="" alt="">
                    </div>
                    <div class="reader-nav">
                        <button class="btn btn-outline" id="prevChapter">上一章</button>
                        <button class="btn btn-primary" id="nextChapter">下一章</button>
                    </div>
                </div>

                <div class="share-footer">
                    <p>这个故事来自乐高故事书</p>
                    <a href="/" class="btn btn-primary">创建你自己的故事</a>
                </div>
            </div>

            <div class="error-state" id="errorState" style="display: none;">
                <div class="error-icon">😢</div>
                <h2>无法访问此故事</h2>
                <p id="errorMessage">分享链接已失效或不存在</p>
                <a href="/" class="btn btn-primary">返回首页</a>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/share-view.js"></script>
</body>
</html>
