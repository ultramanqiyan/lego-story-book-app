<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 乐高故事书</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo-link">
                    <h1>乐高故事书</h1>
                </a>
                <p>欢迎回来，小冒险家！</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </div>

                <div class="auth-links">
                    <a href="#" id="showRegister">还没有账号？立即注册</a>
                </div>
            </form>

            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="regUsername">用户名</label>
                    <input type="text" id="regUsername" name="username" placeholder="请输入用户名" required minlength="3" maxlength="20">
                </div>

                <div class="form-group">
                    <label for="regPassword">密码</label>
                    <input type="password" id="regPassword" name="password" placeholder="请输入密码（至少6位）" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">确认密码</label>
                    <input type="password" id="regConfirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
                </div>

                <div class="form-group">
                    <label for="regNickname">昵称</label>
                    <input type="text" id="regNickname" name="nickname" placeholder="请输入昵称（可选）">
                </div>

                <div class="form-group">
                    <label for="regAge">年龄</label>
                    <select id="regAge" name="age">
                        <option value="">请选择年龄段</option>
                        <option value="3-5">3-5岁</option>
                        <option value="6-8">6-8岁</option>
                        <option value="9-12">9-12岁</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">注册</button>
                </div>

                <div class="auth-links">
                    <a href="#" id="showLogin">已有账号？立即登录</a>
                </div>
            </form>
        </div>

        <div class="auth-decoration">
            <div class="floating-blocks">
                <div class="block block-1"></div>
                <div class="block block-2"></div>
                <div class="block block-3"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
